<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>zotellm</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>zotellm</h1>

    <!-- Input / Output -->
    <div class="field-row">
      <label for="input-file">Input File:</label>
      <input type="text" id="input-file" placeholder="Select .docx or .md file" readonly>
      <button id="browse-input" class="btn-browse">Browse...</button>
    </div>

    <div class="field-row">
      <label for="output-file">Output File:</label>
      <input type="text" id="output-file" placeholder="(auto: input_zotero.docx)">
      <button id="browse-output" class="btn-browse">Browse...</button>
    </div>

    <!-- Provider -->
    <div class="field-row">
      <label for="provider">LLM Provider:</label>
      <select id="provider">
        <option value="cli" selected>cli</option>
        <option value="openai">openai</option>
        <option value="anthropic">anthropic</option>
      </select>
    </div>

    <div class="field-row" id="cli-row">
      <label for="cli-command">CLI Command:</label>
      <input type="text" id="cli-command" placeholder="(auto-detect: claude, ollama, llm)">
    </div>

    <div class="field-row hidden" id="model-row">
      <label for="model">Model:</label>
      <input type="text" id="model" placeholder="(default for provider)">
    </div>

    <div class="field-row hidden" id="key-row">
      <label for="api-key">API Key:</label>
      <input type="password" id="api-key" placeholder="(uses env var if empty)">
    </div>

    <!-- Zotero DB -->
    <div class="field-row">
      <label for="zotero-db">Zotero DB:</label>
      <input type="text" id="zotero-db" readonly>
      <button id="browse-zotero" class="btn-browse">Browse...</button>
    </div>

    <!-- Advanced Options -->
    <details id="advanced-section">
      <summary>Advanced Options</summary>
      <div class="advanced-content">
        <div class="field-row">
          <label for="font">Font:</label>
          <input type="text" id="font" value="Calibri">
          <label for="size" class="label-inline">Size:</label>
          <input type="number" id="size" value="11" min="6" max="36" style="width: 60px;">
        </div>
        <div class="field-row">
          <label for="bib-heading">Bib Heading:</label>
          <input type="text" id="bib-heading" value="References">
        </div>
        <div class="field-row">
          <label for="reference-doc">Reference Doc:</label>
          <input type="text" id="reference-doc" placeholder="Pandoc reference .docx template" readonly>
          <button id="browse-refdoc" class="btn-browse">Browse...</button>
        </div>
        <div class="checks-row">
          <label><input type="checkbox" id="no-crossref"> No CrossRef</label>
          <label><input type="checkbox" id="dry-run"> Dry Run</label>
        </div>
      </div>
    </details>

    <!-- Format Button -->
    <button id="format-btn" class="btn-primary">Format Citations</button>

    <!-- Log -->
    <label class="log-label">Log:</label>
    <div id="log-output"></div>
  </div>

  <!-- Resolve Modal -->
  <div id="resolve-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Resolve Citation Match</h2>
      <p id="resolve-header"></p>
      <div id="resolve-candidates"></div>
      <div class="resolve-actions">
        <button id="resolve-ok" class="btn-primary">OK</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
